# ============================================================
# AML Monitoring System — Configuration
# ============================================================

# ------------------------------------------------------------------
# Data Ingestion
# ------------------------------------------------------------------
ingestion:
  chunk_size: 50000                   # Rows per chunk for 1M-row processing
  date_format: "%m/%d/%Y"             # IBM dataset date format
  time_format: "%H:%M:%S"             # IBM dataset time format
  input_file: "data/raw/transactions.csv"
  processed_file: "data/processed/transactions_clean.parquet"

# ------------------------------------------------------------------
# Rules Engine — thresholds and weights
# ------------------------------------------------------------------
rules:
  large_transaction:
    enabled: true
    threshold_usd: 10000              # Fallback threshold for any currency not explicitly configured
    thresholds_by_currency:
      USD: 10000
      "US dollar": 10000
      EUR: 9000
      Euro: 9000
      GBP: 8000
      "UK pounds": 8000
    score: 25

  high_risk_country:
    enabled: true
    score: 30
    high_risk_countries:             # FATF grey/blacklist + known AML hotspots
      - "Iran"
      - "North Korea"
      - "Myanmar"
      - "Syria"
      - "Yemen"
      - "Libya"
      - "Sudan"
      - "Afghanistan"
      - "Haiti"
      - "Cayman Islands"
      - "British Virgin Islands"
      - "Panama"
      - "Malta"
      - "Philippines"
      - "South Sudan"
      - "Vanuatu"

  smurfing:
    enabled: true
    score: 40
    window_hours: 24                  # Time window to look for structuring
    min_transactions: 3               # Minimum txns in window
    individual_threshold: 9999        # Each txn just below reporting threshold
    cumulative_threshold: 10000       # But combined total exceeds this

  layering:
    enabled: true
    score: 25
    window_hours: 72        # Time window for chain / burst detection
    min_chain_length: 4     # Min hops for linear chain
    min_fan_degree: 4       # Min distinct accounts to trigger fan-in / fan-out
    detect_fan_out: true    # Detect smurfing (one sender -> many receivers)
    detect_fan_in: true     # Detect aggregation (many senders -> one receiver)

  rapid_movement:
    enabled: true
    score: 20
    window_hours: 24
    passthrough_pct: 0.80             # 80%+ of received funds sent out

# ------------------------------------------------------------------
# Risk Scoring — tier thresholds
# ------------------------------------------------------------------
risk_scoring:
  tiers:
    LOW:      [0, 30]
    MEDIUM:   [31, 59]
    HIGH:     [60, 79]
    CRITICAL: [80, 999]
  # Only MEDIUM and above generate alerts
  alert_threshold: "MEDIUM"

# ------------------------------------------------------------------
# Alert Management
# ------------------------------------------------------------------
alerts:
  output_file: "data/outputs/alerts/alerts.csv"
  excel_report: "data/outputs/alerts/alert_report.xlsx"
  dedup_window_hours: 48              # Don't re-alert same account within this window

# ------------------------------------------------------------------
# Investigation
# ------------------------------------------------------------------
investigation:
  cases_dir: "data/outputs/cases"
  sanctions_file: "config/sanction_list.csv"
  customer_details_file: "data/raw/customer_details_with_risk.csv"
  fuzzy_match_threshold: 85          # Minimum fuzzy match score (0–100) for sanctions
  auto_escalate_tiers:
    - "CRITICAL"
  manual_review_tiers:
    - "HIGH"

# ------------------------------------------------------------------
# SAR Reporting
# ------------------------------------------------------------------
sar:
  template_pdf: "reports/templates/SAR_template.pdf"
  output_dir: "data/outputs/sar"
  filing_institution: "Acme Financial Services Inc."
  filing_institution_address: "100 Compliance Street, New York, NY 10001"
  filing_institution_tin: "XX-XXXXXXX"
  contact_name: "AML Compliance Officer"
  contact_phone: "+1-555-000-0000"
  contact_email: "aml@acmefinancial.com"

# ------------------------------------------------------------------
# Logging
# ------------------------------------------------------------------
logging:
  level: "INFO"                       # DEBUG | INFO | WARNING | ERROR
  log_file: "data/outputs/aml_system.log"
